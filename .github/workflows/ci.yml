name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec playwright install chromium
      - run: pnpm check
      - run: pnpm build
      - run: pnpm test:run -- --exclude 'tests/e2e/**' --coverage --reporter=junit --outputFile=test-report.junit.xml
      - run: pnpm test:e2e
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - if: always() && hashFiles('packages/*/test-report.junit.xml') != ''
        uses: dorny/test-reporter@4a2e97665d5fa767581ef38eca97b9694bd4eef4 # v2
        with:
          path: "test-report.junit.xml"
          reporter: java-junit
          name: Vitest Tests
          use-actions-summary: "true"
          fail-on-empty: "false"
      - uses: fallow-rs/fallow@v3
        if: always() && hashFiles('coverage/lcov.info') != ''
        with:
          command: audit
          format: sarif
          annotations: true
          comment: true
          review-comments: true
          args: --coverage ${{ github.workspace }}/lcov.info
          max-annotations: 50
          gate: new-only
      