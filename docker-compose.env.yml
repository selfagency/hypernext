services:
  hypernext:
    image: hypernext:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "1965:1965"
      - "70:70"
      - "300:300"
      - "1900:1900"
      - "79:79"
      - "5011:5011"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./content:/app/content
      - ./assets:/app/assets
      - ./templates:/app/templates
      - ./hypernext.db:/app/hypernext.db
    env_file:
      - .env
    restart: unless-stopped
