site:
  canonicalBase: "http://localhost:8080"
  meta:
    title: "My Hypernext Site"
    description: "A multi-protocol blog and static content library."
    lang: "en"
  theme:
    cssPath: "./assets/style.css"
  pdf:
    enabled: true
    cssPath: "./assets/pdf-style.css"
  ebooks:
    enabled: true
  metadata:
    - name: readTime
      label: "Reading Time"
      type: number
    - name: difficulty
      label: "Difficulty"
      type: string
      options: [beginner, intermediate, advanced]
    - name: featured
      label: "Featured"
      type: boolean
    - name: series
      label: "Series"
      type: string

author:
  name: "Anonymous"
  bio: "Hypernext author."

storage:
  type: local
  local:
    path: "./content"

database:
  type: sqlite
  path: "./db/hypernext.db"

api:
  enabled: true

collections:
  blog:
    path: "/blog/"
    syndicate: true
    rss: true
    layout: "blog.mdx"
  library:
    path: "/library/"
    syndicate: false
    rss: false
    layout: "library.mdx"

taxonomies:
  - name: tags
    plural: tags
    singular: tag
  - name: categories
    plural: categories
    singular: category

protocols:
  http:
    enabled: true
    port: 8080
  gemini:
    enabled: true
    port: 1965
  gopher:
    enabled: true
    port: 70
  spartan:
    enabled: true
    port: 300
  nex:
    enabled: true
    port: 1900
  finger:
    enabled: true
    port: 79
  text:
    enabled: true
    port: 5011

micropub:
  enabled: true

indieauth:
  enabled: true

syndication: {}

email:
  enabled: true
  mailpit: true
  from:
    name: "Hypernext"
    address: "noreply@localhost"
  replyTo: "noreply@localhost"
  subjectPrefix: "[Hypernext]"
  transport: smtp
  smtp:
    host: localhost
    port: 1025
    secure: false
    user: ""
    pass: ""
  newsletter:
    digestSchedule: "0 8 * * 1"
    digestTime: "08:00"
  contactForm:
    enabled: false
    recipient: ""
    akismet: false
    captcha: false

comments:
  enabled: true
  inbound:
    webmention: true
    pingback: true
    trackback: false
  aggregation:
    mastodon: true
    bluesky: true
    cacheTtl: 900
  akismet:
    enabled: true

mcp: {}

ai:
  enabled: false
  openai:
    baseUrl: "http://localhost:11434/v1"
    apiKey: ""
  models:
    embedding: "nomic-embed-text-v2-moe:latest"
    utility: "llama3.2:1b"
    vision: "llava:7b"
    reasoning: "llama3.1:8b"
  vectorDimensions: 768
  features:
    altText: true
    autoTagging: true
    seoMeta: true
    moderation: true

robotsTxt:
  enabled: true
  aiCrawlers: block
  rules: []

contentSignals:
  enabled: true
  aiTrain: false
  search: true
  aiInput: false

securityTxt:
  contact: []
  expires: ""

agent:
  enabled: false
  markdownNegotiation: true
  llmsTxt: true
  sitemap: true
  linkHeaders: true
  wellKnown:
    apiCatalog: true
    agentSkills: true
    mcpServerCard: true
    webBotAuth: true
    webmcp: true
  hiddenAgentDirective: true
  viewTransitions: true

ipfs:
  enabled: false
  apiEndpoint: "http://127.0.0.1:5001"
  gatewayUrl: "https://ipfs.io/ipfs"
  pinning: true
  cacheHtml: true
